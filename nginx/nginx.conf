# ============================================================
# PAMP — Nginx Reverse Proxy Configuration
# Internal deployment — no TLS (add Let's Encrypt if needed)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ipv6=off avoids resolution failures in Docker bridge networks
    resolver 127.0.0.11 valid=10s ipv6=off;
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Upstream services (internal Docker network)

    server {
        listen 80;
        server_name _;

        # Security headers (internal tool — reasonable baseline)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API routes → FastAPI backend ────────────────────────
        # Strips /api prefix: /api/auth/login → /auth/login
        # set $var forces nginx to use the resolver at request time,
        # not at startup — fixes "host not found in upstream" on boot.
        location /api/ {
            set $backend backend;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── FastAPI OpenAPI docs (optional — disable in production) ──
        location /docs {
            set $backend backend;
            proxy_pass http://$backend:8000;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            set $backend backend;
            proxy_pass http://$backend:8000;
            proxy_set_header Host $host;
        }

        # ── Next.js static assets (served directly by Next.js) ──
        location /_next/static/ {
            set $frontend frontend;
            proxy_pass http://$frontend:3000;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── All other routes → Next.js frontend ─────────────────
        location / {
            set $frontend frontend;
            proxy_pass http://$frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }
    }
}
